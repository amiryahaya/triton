name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Job dependency graph (all jobs start after "web" completes):
#
#   web ──┬── lint ──────────────────────────────────────────────┐
#         ├── test ──┬── integration-test-manage ──┬── coverage  ├── build
#         │          └── integration-test-core ────┘             │
#         └──────────────────────────────────────────────────────┘
#
# Critical path (estimated):
#   web (1m) → test (3m) → integration-test-core (10m) ≈ 14 min total
#   Previously: web → test → integration-test (all serial) ≈ 33 min
# ---------------------------------------------------------------------------

jobs:
  web:
    name: Web build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Test
        working-directory: web
        run: pnpm test

      - name: Build
        working-directory: web
        run: pnpm build

      # All three portals' Vite builds populate their respective
      # pkg/<portal>/ui/dist/ directories.
      - name: Upload built portals
        uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: |
            pkg/licenseserver/ui/dist/
            pkg/server/ui/dist/
            pkg/manageserver/ui/dist/
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download built portals
        uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: pkg/

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

      - name: Ensure admin-key is gone from production code
        run: |
          if grep -rE "X-Triton-Admin-Key|AdminKeyAuth|TRITON_LICENSE_SERVER_ADMIN_KEY" \
              pkg/licenseserver/ cmd/licenseserver/ \
              --include="*.go" \
              --exclude="*_test.go" \
              --exclude-dir=node_modules; then
            echo "Admin-key references found in production Go code — must be removed."
            exit 1
          fi
          echo "Admin-key guard clean."

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [web]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download built portals
        uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: pkg/

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      # Unit tests are package-local with no shared DB state, so packages
      # can run concurrently (default -p = GOMAXPROCS). Drop -p 1.
      - name: Run unit tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: go test -v -race ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ---------------------------------------------------------------------------
  # integration-test-manage
  #
  # Runs integration tests for the Manage Server portal and its store layer.
  # All tests in these packages create per-test PostgreSQL schemas via an
  # atomic counter (test_X_N), so they are safe to run concurrently without
  # -p 1.
  # ---------------------------------------------------------------------------
  integration-test-manage:
    name: Integration Test / Manage Portal
    runs-on: ubuntu-latest
    needs: [test, web]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download built portals
        uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: pkg/

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run manage integration tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: |
          go test -v -tags integration -race -count=1 \
            -coverprofile=coverage-manage.out -covermode=atomic \
            -coverpkg=./pkg/manageserver/...,./pkg/managestore/...,./pkg/scanrunner/... \
            ./pkg/manageserver/... ./pkg/managestore/... ./pkg/scanrunner/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-manage
          path: coverage-manage.out

  # ---------------------------------------------------------------------------
  # integration-test-core
  #
  # Runs integration tests for the Report Server, License Server, scanner,
  # and the full-stack test/integration suite. These packages share the main
  # triton_test DB so they must remain serialised with -p 1.
  # ---------------------------------------------------------------------------
  integration-test-core:
    name: Integration Test / Core
    runs-on: ubuntu-latest
    needs: [test, web]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Download the Vite-built portal assets from the web job so that
      # //go:embed pulls real dist/ content into the integration test
      # binary. Without this step pkg/server/ui/dist/ only contains
      # .gitkeep + logo.png + manage/, and TestUIServeIndex /
      # TestUIServeHashedAssets fail with 404s.
      - name: Download built portals
        uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: pkg/

      - name: Create license test database
        run: psql postgres://triton:triton@localhost:5434/triton_test?sslmode=disable -c "CREATE DATABASE triton_license_test;"

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run core integration tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: |
          go test -v -tags integration -race -count=1 -p 1 \
            -coverprofile=coverage-core.out -covermode=atomic \
            -coverpkg=./pkg/...,./internal/... \
            $(go list -tags integration ./... \
              | grep -vE "pkg/manageserver|pkg/managestore|pkg/scanrunner" \
              | tr '\n' ' ')

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: coverage-core.out

  # ---------------------------------------------------------------------------
  # coverage-gate
  #
  # Merges the two coverage profiles (manage + core) and enforces the 60%
  # threshold. Both profiles instrument ./pkg/..././internal/... so
  # concatenating them (keeping one mode: header) gives the combined picture.
  # ---------------------------------------------------------------------------
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [integration-test-manage, integration-test-core]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge and check coverage
        run: |
          # Concatenate profiles: keep the mode header from the first file,
          # strip it from the second, then check the combined total.
          echo "mode: atomic" > merged.out
          grep -hv "^mode:" coverage-manage.out coverage-core.out >> merged.out

          COVERAGE=$(go tool cover -func=merged.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Testable package coverage (unit + integration): ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download built portals
        uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: pkg/

      - name: Build triton
        run: go build -o bin/triton main.go

      - name: Build license server
        run: go build -o bin/triton-license-server cmd/licenseserver/main.go

      - name: Verify triton binary
        run: ./bin/triton --version

      - name: Verify license server binary
        run: test -x ./bin/triton-license-server

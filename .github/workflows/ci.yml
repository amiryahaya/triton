name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  web:
    name: Web build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Test
        working-directory: web
        run: pnpm test

      - name: Build
        working-directory: web
        run: pnpm build

      - name: Upload built portals
        uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: |
            pkg/licenseserver/ui/dist/
            pkg/server/ui/dist/
          retention-days: 7

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: go test -v -race -p 1 ./...

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run integration tests with coverage
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: |
          go test -v -tags integration -race -count=1 -p 1 \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./pkg/...,./internal/... ./...

      - name: Check coverage
        run: |
          # Coverage is measured from the integration test job (not the
          # unit test job) because pkg/server, pkg/licenseserver, and
          # pkg/store are exercised primarily through integration-tagged
          # tests. Running the coverage gate on unit-only tests would
          # under-count those packages and produce a misleading number.
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Testable package coverage (unit + integration): ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build triton
        run: go build -o bin/triton main.go

      - name: Build license server
        run: go build -o bin/triton-license-server cmd/licenseserver/main.go

      - name: Verify triton binary
        run: ./bin/triton --version

      - name: Verify license server binary
        run: test -x ./bin/triton-license-server

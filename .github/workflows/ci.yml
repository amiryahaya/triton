name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: |
          go test -v -race -p 1 -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./pkg/...,./internal/... ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Testable package coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 75" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run integration tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: go test -v -tags integration -race -count=1 -p 1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bin/triton main.go

      - name: Verify binary
        run: ./bin/triton --version

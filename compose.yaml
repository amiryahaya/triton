services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: triton-db
    environment:
      POSTGRES_DB: triton
      POSTGRES_USER: triton
      POSTGRES_PASSWORD: triton
    ports:
      - "5434:5432"
    volumes:
      - triton-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triton"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  triton-data:

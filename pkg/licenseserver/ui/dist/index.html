<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triton License Server</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Triton" class="logo-img">
      <div class="logo-text-group">
        <span class="logo-title">Triton</span>
        <span class="logo-sub">License Server</span>
      </div>
    </div>
    <div class="nav-section">
      <a href="#/" class="nav-link active">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="6.5" height="7.5" rx="1.5"/><rect x="10.5" y="1" width="6.5" height="4.5" rx="1.5"/><rect x="1" y="11.5" width="6.5" height="5.5" rx="1.5"/><rect x="10.5" y="8.5" width="6.5" height="8.5" rx="1.5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#/orgs" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16V3.5A1 1 0 013 2.5h4.5a1 1 0 011 1V16"/><path d="M8.5 16V7a1 1 0 011-1H15a1 1 0 011 1v9"/><line x1="2" y1="16" x2="16" y2="16"/><line x1="4.5" y1="5.5" x2="6" y2="5.5"/><line x1="4.5" y1="8" x2="6" y2="8"/><line x1="4.5" y1="10.5" x2="6" y2="10.5"/><line x1="11" y1="9" x2="12.5" y2="9"/><line x1="11" y1="11.5" x2="12.5" y2="11.5"/></svg>
        <span>Organizations</span>
      </a>
      <a href="#/licenses" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2l5.5 5.5-8 8H2v-5.5z"/><path d="M8.5 3.5l5.5 5.5"/></svg>
        <span>Licenses</span>
      </a>
      <a href="#/activations" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="13.5" r="1.5" fill="currentColor" stroke="none"/><path d="M5.5 11a5 5 0 017 0"/><path d="M3 8.5a8 8 0 0112 0"/></svg>
        <span>Activations</span>
      </a>
      <a href="#/audit" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="2" width="11" height="14" rx="1.5"/><path d="M6.5 2V1a.5.5 0 01.5-.5h4a.5.5 0 01.5.5v1"/><line x1="6.5" y1="7" x2="11.5" y2="7"/><line x1="6.5" y1="9.5" x2="11.5" y2="9.5"/><line x1="6.5" y1="12" x2="9.5" y2="12"/></svg>
        <span>Audit Log</span>
      </a>
      <a href="#/binaries" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 6L9 2l7.5 4L9 10 1.5 6z"/><path d="M1.5 6v5.5L9 16l7.5-4.5V6"/><path d="M9 10v6"/></svg>
        <span>Binaries</span>
      </a>
      <a href="#/superadmins" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1l3 3 4 1-3 3 1 4-5-2-5 2 1-4-3-3 4-1z"/></svg>
        <span>Superadmins</span>
      </a>
    </div>
    <div class="sidebar-wave">
      <svg viewBox="0 0 260 50" preserveAspectRatio="none"><path d="M0,25 C40,40 80,10 130,25 C180,40 220,10 260,25 L260,50 L0,50Z"/></svg>
    </div>
  </nav>
  <main id="content">
    <div id="page" aria-live="polite"></div>
  </main>
</div>
<script src="admin.js"></script>
</body>
</html>

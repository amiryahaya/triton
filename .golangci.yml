version: "2"

# golangci-lint v2 configuration for Triton
run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - prealloc
    - unconvert
    - unparam
    - bodyclose
  settings:
    misspell:
      extra-words:
        - typo: "mosquitto"
          correction: "mosquitto"
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
    govet:
      disable:
        - fieldalignment
  exclusions:
    rules:
      # QF1012 is a style suggestion (fmt.Fprintf vs WriteString+Sprintf), not a bug
      - linters:
          - staticcheck
        text: "QF1012"
      # Relax rules for test files
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - prealloc
          - unparam
      # Relax rules for test fixtures
      - path: test/fixtures/
        linters:
          - errcheck
      # Relax rules for in-package test fixture builders (imported by _test.go
      # in this package and by build-tagged integration test shims elsewhere)
      - path: pkg/scanner/internal/cli/testfixture\.go
        linters:
          - errcheck
          - gocritic
          - ineffassign

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/amiryahaya/triton

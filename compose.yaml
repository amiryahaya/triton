services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: triton-db
    environment:
      POSTGRES_DB: triton
      POSTGRES_USER: triton
      POSTGRES_PASSWORD: triton
    ports:
      - "5434:5432"
    volumes:
      - triton-data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triton"]
      interval: 5s
      timeout: 5s
      retries: 5

  triton:
    build:
      context: .
      dockerfile: Containerfile
      args:
        PUBLIC_KEY_HEX: "${TRITON_PUBLIC_KEY_HEX:-a158a5193e2443ddc7cc7c25745c407e47d6c68ff56d8baddf4e822ce43cff96}"
    container_name: triton-server
    profiles: [server]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOME: /tmp
      TRITON_DB_URL: postgres://triton:triton@postgres:5432/triton?sslmode=disable
      TRITON_LISTEN: ":8080"
      TRITON_LICENSE_KEY: "${TRITON_LICENSE_KEY:-eyJsaWQiOiIwMTljYzNmMS01NjE0LTc0NjUtYWY5NS02NmQ0N2E4NjBkZGEiLCJ0aWVyIjoiZW50ZXJwcmlzZSIsIm9yZyI6ImNvbnRhaW5lci1kZXYiLCJzZWF0cyI6MTAwLCJpYXQiOjE3NzI4MTM4OTksImV4cCI6MjA4ODE3Mzg5OX0.NZTxYq5pRRK6FzxzrOJrxPxhTFC-f-7mwDOI_7rqtRpP-rO0Al5LYqzkyHEEU_eLPmc9uccguiRUp_AItR1jCg}"
    ports:
      - "8080:8080"
    # NOTE: host.containers.internal is Podman-specific. Docker Linux users
    # must set TRITON_KEYCLOAK_ISSUER explicitly (e.g., http://host.docker.internal:8080/realms/platform).
    command: ["server", "--listen", ":8080", "--db", "postgres://triton:triton@postgres:5432/triton?sslmode=disable", "--keycloak-issuer", "${TRITON_KEYCLOAK_ISSUER:-http://host.containers.internal:8080/realms/platform}", "--keycloak-client-id", "${TRITON_KEYCLOAK_CLIENT_ID:-triton}"]

  license-server:
    build:
      context: .
      dockerfile: Containerfile.licenseserver
    container_name: triton-license-server
    profiles: [license-server]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRITON_LICENSE_SERVER_DB_URL: postgres://triton:triton@postgres:5432/triton_license?sslmode=disable
      TRITON_LICENSE_SERVER_LISTEN: ":8081"
      TRITON_LICENSE_SERVER_KEYCLOAK_ISSUER: "${TRITON_LICENSE_SERVER_KEYCLOAK_ISSUER:-http://host.containers.internal:8080/realms/platform}"
      TRITON_LICENSE_SERVER_KEYCLOAK_CLIENT_ID: "${TRITON_LICENSE_SERVER_KEYCLOAK_CLIENT_ID:-triton}"
      TRITON_LICENSE_SERVER_SIGNING_KEY: "${TRITON_LICENSE_SERVER_SIGNING_KEY:?TRITON_LICENSE_SERVER_SIGNING_KEY must be set}"
      TRITON_LICENSE_SERVER_BINARIES_DIR: /tmp/binaries
    ports:
      - "8081:8081"

volumes:
  triton-data:

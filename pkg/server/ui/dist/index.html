<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triton Dashboard</title>
<link rel="icon" href="/ui/logo.png" type="image/png">
<link rel="stylesheet" href="/ui/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <img src="/ui/logo.png" alt="Triton" class="logo-img">
      <div class="logo-text-group">
        <span class="logo-title">Triton</span>
        <span class="logo-sub">PQC Scanner</span>
      </div>
    </div>
    <div class="nav-section">
      <a href="#/" class="nav-link active" data-view="overview">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="6.5" height="7.5" rx="1.5"/><rect x="10.5" y="1" width="6.5" height="4.5" rx="1.5"/><rect x="1" y="11.5" width="6.5" height="5.5" rx="1.5"/><rect x="10.5" y="8.5" width="6.5" height="8.5" rx="1.5"/></svg>
        <span>Overview</span>
      </a>
      <a href="#/machines" class="nav-link" data-view="machines">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="10" rx="1.5"/><line x1="6" y1="16" x2="12" y2="16"/><line x1="9" y1="13" x2="9" y2="16"/></svg>
        <span>Machines</span>
      </a>
      <a href="#/scans" class="nav-link" data-view="scans">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 2v7l4 4"/></svg>
        <span>Scans</span>
      </a>
      <a href="#/diff" class="nav-link" data-view="diff">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><path d="M12 3v12"/><path d="M6 9h6"/><path d="M3 6l3-3 3 3"/><path d="M12 12l3 3-3 3"/></svg>
        <span>Diff</span>
      </a>
      <a href="#/trend" class="nav-link" data-view="trend">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,14 5.5,8 9,10 13,4 16,6"/><polyline points="12,4 16,4 16,8"/></svg>
        <span>Trend</span>
      </a>
      <div class="nav-section-label">Analytics</div>
      <a href="#/inventory" class="nav-link" data-view="inventory">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="12" rx="1.5"/><line x1="2" y1="7" x2="16" y2="7"/><line x1="6" y1="7" x2="6" y2="15"/></svg>
        <span>Inventory</span>
      </a>
      <a href="#/certificates" class="nav-link" data-view="certificates">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="10" rx="1"/><line x1="2" y1="8" x2="16" y2="8"/><circle cx="6" cy="11" r="1"/><line x1="9" y1="11" x2="14" y2="11"/></svg>
        <span>Certificates</span>
      </a>
      <a href="#/priority" class="nav-link" data-view="priority">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14l3-3 3 3 4-8"/><path d="M11 3h3v3"/></svg>
        <span>Priority</span>
      </a>
      <a href="#/systems" class="nav-link" data-view="systems">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="7" height="7" rx="1"/><rect x="10" y="1" width="7" height="7" rx="1"/><rect x="1" y="10" width="7" height="7" rx="1"/><rect x="10" y="10" width="7" height="7" rx="1"/></svg>
        <span>Systems</span>
      </a>
      <a href="#/trends" class="nav-link" data-view="trends">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,14 5.5,8 9,10 13,4 16,6"/><polyline points="12,4 16,4 16,8"/></svg>
        <span>Migration Trend</span>
      </a>
      <a href="#/remediation" class="nav-link" data-view="remediation">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1v16"/><path d="M1 9h16"/><circle cx="9" cy="9" r="7"/></svg>
        <span>Remediation</span>
      </a>
      <a href="#/users" class="nav-link" data-view="users" id="nav-users" style="display:none">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="3"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        <span>Users</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div id="user-info" class="user-info" style="display:none">
        <div class="user-info-org" id="user-info-org"></div>
        <div class="user-info-line">
          <span class="user-info-name" id="user-info-name"></span>
          <span class="user-info-role" id="user-info-role"></span>
        </div>
      </div>
      <button id="nav-logout" class="nav-link nav-logout" style="display:none" onclick="tritonLogout()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="11 13 15 9 11 5"/><line x1="15" y1="9" x2="7" y2="9"/></svg>
        <span>Sign out</span>
      </button>
    </div>
    <div class="sidebar-wave">
      <svg viewBox="0 0 260 50" preserveAspectRatio="none"><path d="M0,25 C40,40 80,10 130,25 C180,40 220,10 260,25 L260,50 L0,50Z"/></svg>
    </div>
  </nav>
  <main id="content">
    <div class="loading">Loading...</div>
  </main>
</div>
<script src="/ui/app.js"></script>
<script src="/ui/components/staleness.js"></script>
<script src="/ui/components/sparkline.js"></script>
<script src="/ui/views/systems.js"></script>
<script src="/ui/views/trends.js"></script>
<script src="/ui/views/remediation.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triton Dashboard</title>
<link rel="icon" href="/ui/logo.png" type="image/png">
<link rel="stylesheet" href="/ui/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <img src="/ui/logo.png" alt="Triton" class="logo-img">
      <div class="logo-text-group">
        <span class="logo-title">Triton</span>
        <span class="logo-sub">PQC Scanner</span>
      </div>
    </div>
    <div class="nav-section">
      <a href="#/" class="nav-link active" data-view="overview">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="6.5" height="7.5" rx="1.5"/><rect x="10.5" y="1" width="6.5" height="4.5" rx="1.5"/><rect x="1" y="11.5" width="6.5" height="5.5" rx="1.5"/><rect x="10.5" y="8.5" width="6.5" height="8.5" rx="1.5"/></svg>
        <span>Overview</span>
      </a>
      <a href="#/machines" class="nav-link" data-view="machines">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="10" rx="1.5"/><line x1="6" y1="16" x2="12" y2="16"/><line x1="9" y1="13" x2="9" y2="16"/></svg>
        <span>Machines</span>
      </a>
      <a href="#/scans" class="nav-link" data-view="scans">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 2v7l4 4"/></svg>
        <span>Scans</span>
      </a>
      <a href="#/diff" class="nav-link" data-view="diff">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><path d="M12 3v12"/><path d="M6 9h6"/><path d="M3 6l3-3 3 3"/><path d="M12 12l3 3-3 3"/></svg>
        <span>Diff</span>
      </a>
      <a href="#/trend" class="nav-link" data-view="trend">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,14 5.5,8 9,10 13,4 16,6"/><polyline points="12,4 16,4 16,8"/></svg>
        <span>Trend</span>
      </a>
    </div>
    <div class="sidebar-wave">
      <svg viewBox="0 0 260 50" preserveAspectRatio="none"><path d="M0,25 C40,40 80,10 130,25 C180,40 220,10 260,25 L260,50 L0,50Z"/></svg>
    </div>
  </nav>
  <main id="content">
    <div class="loading">Loading...</div>
  </main>
</div>
<script src="/ui/app.js"></script>
</body>
</html>

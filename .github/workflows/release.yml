name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: triton
          POSTGRES_PASSWORD: triton
          POSTGRES_DB: triton_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U triton -d triton_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run unit tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: go test -v -race -p 1 ./...

      - name: Run integration tests
        env:
          TRITON_TEST_DB_URL: postgres://triton:triton@localhost:5434/triton_test?sslmode=disable
        run: go test -v -tags integration -race -count=1 -p 1 ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    name: Container Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/amiryahaya/triton:${{ steps.version.outputs.version }}
            ghcr.io/amiryahaya/triton:latest
          labels: |
            org.opencontainers.image.title=Triton
            org.opencontainers.image.description=Enterprise SBOM/CBOM scanner for PQC compliance
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/amiryahaya/triton
            org.opencontainers.image.licenses=MIT

  upload-binaries:
    name: Upload Binaries to License Server
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ vars.LICENSE_SERVER_URL != '' }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "triton-*-*.tar.gz" \
            --pattern "triton-*-*.zip" \
            --dir ./release-assets

      - name: Upload binaries to license server
        env:
          LICENSE_SERVER_URL: ${{ vars.LICENSE_SERVER_URL }}
          LICENSE_SERVER_ADMIN_KEY: ${{ secrets.LICENSE_SERVER_ADMIN_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd release-assets
          for archive in *; do
            # Extract os and arch from filename: triton-{version}-{os}-{arch}.tar.gz
            base="${archive%%.tar.gz}"
            base="${base%%.zip}"
            os=$(echo "$base" | awk -F- '{print $(NF-1)}')
            arch=$(echo "$base" | awk -F- '{print $NF}')

            # Normalize os names (GoReleaser uses Darwin/Linux/Windows)
            os=$(echo "$os" | tr '[:upper:]' '[:lower:]')

            # Extract binary
            tmpdir=$(mktemp -d)
            if [[ "$archive" == *.zip ]]; then
              unzip -q "$archive" -d "$tmpdir"
            else
              tar xzf "$archive" -C "$tmpdir"
            fi

            # Find the binary
            binary=$(find "$tmpdir" -name "triton" -o -name "triton.exe" | head -1)
            if [ -z "$binary" ]; then
              echo "No binary found in $archive, skipping"
              rm -rf "$tmpdir"
              continue
            fi

            echo "Uploading $os/$arch from $archive..."
            curl -sf -X POST "${LICENSE_SERVER_URL}/api/v1/admin/binaries" \
              -H "X-Triton-Admin-Key: ${LICENSE_SERVER_ADMIN_KEY}" \
              -F "version=${VERSION}" \
              -F "os=${os}" \
              -F "arch=${arch}" \
              -F "file=@${binary}" || echo "Warning: upload failed for $os/$arch"

            rm -rf "$tmpdir"
          done

  container-licenseserver:
    name: License Server Container Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.licenseserver
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/amiryahaya/triton-license-server:${{ steps.version.outputs.version }}
            ghcr.io/amiryahaya/triton-license-server:latest
          labels: |
            org.opencontainers.image.title=Triton License Server
            org.opencontainers.image.description=Centralized license management for Triton
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/amiryahaya/triton
            org.opencontainers.image.licenses=MIT

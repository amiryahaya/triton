name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate test fixtures
        run: go run test/fixtures/generate.go

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./pkg/...,./internal/... ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Testable package coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 75" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bin/triton main.go

      - name: Verify binary
        run: ./bin/triton --version

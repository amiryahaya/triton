# GoReleaser configuration for Triton
# Docs: https://goreleaser.com
version: 2

builds:
  - id: triton
    main: ./main.go
    binary: triton
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/amiryahaya/triton/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "triton-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: amiryahaya
    name: triton
  prerelease: auto

changelog:
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^Merge"

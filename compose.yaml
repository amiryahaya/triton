# =============================================================================
#  Triton local-development compose stack
# =============================================================================
#
# ⚠️  THIS FILE IS FOR LOCAL DEVELOPMENT ONLY.  DO NOT USE IN PRODUCTION.
#
# Every `${VAR:-...}` default below is a publicly-known dev value committed
# to the public repository:
#
#   * TRITON_LICENSE_KEY default — an enterprise-tier Ed25519 token signed
#     by the DEVELOPMENT public key committed as TRITON_PUBLIC_KEY_HEX
#     below. Valid until 2036, NOT machine-bound. Only grants enterprise
#     tier to binaries built with this specific dev pubkey.
#
#   * TRITON_PUBLIC_KEY_HEX default — the dev Ed25519 public key, distinct
#     from whatever the production release uses (which should be injected
#     via ldflags at release build time).
#
#   * TRITON_LICENSE_SERVER_ADMIN_KEY default — "dev-admin-key". Known
#     bearer secret. Gates the license server's admin API.
#
#   * TRITON_LICENSE_SERVER_ADMIN_PASSWORD default —
#     "dev-admin-password-change-me". Bootstraps the first superadmin.
#
#   * REPORT_SERVER_SERVICE_KEY + TRITON_LICENSE_SERVER_REPORT_KEY
#     defaults — "dev-service-key-888e5158...". The shared secret used
#     for cross-server (license→report) provisioning calls. Anyone who
#     knows this value can impersonate the license server to the report
#     server.
#
#   * REPORT_SERVER_JWT_SIGNING_KEY default — "61627bd3...". The Ed25519
#     seed used to sign org-user JWTs. Anyone who knows this value can
#     mint a valid JWT for any org.
#
# Every single one of these MUST be replaced for any deployment that:
#
#     - is reachable from outside localhost, OR
#     - holds real customer data, OR
#     - is shared with any user who is not the developer running it.
#
# To override for a real deployment, create a .env file (gitignored) with
# freshly generated values and run:
#
#     export RESEND_API_KEY=$(cat ~/.resend_key)                      # for real mail
#     export REPORT_SERVER_JWT_SIGNING_KEY=$(openssl rand -hex 32)
#     export REPORT_SERVER_SERVICE_KEY=$(openssl rand -hex 32)
#     export TRITON_LICENSE_SERVER_REPORT_KEY=$REPORT_SERVER_SERVICE_KEY
#     export TRITON_LICENSE_SERVER_ADMIN_KEY=$(openssl rand -hex 32)
#     export TRITON_LICENSE_SERVER_ADMIN_PASSWORD=$(openssl rand -base64 24)
#     podman compose --profile server --profile license-server up -d
#
# Sprint 4 backlog has a `compose.prod.yaml` variant with every default
# stripped to the empty string so a production operator cannot silently
# fall back to dev values. Until that ships, use the override recipe
# above.
#
# =============================================================================

services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: triton-db
    environment:
      POSTGRES_DB: triton
      POSTGRES_USER: triton
      POSTGRES_PASSWORD: triton
    ports:
      - "5435:5432"
    volumes:
      - triton-data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triton"]
      interval: 5s
      timeout: 5s
      retries: 5

  triton:
    build:
      context: .
      dockerfile: Containerfile
      args:
        PUBLIC_KEY_HEX: "${TRITON_PUBLIC_KEY_HEX:-a158a5193e2443ddc7cc7c25745c407e47d6c68ff56d8baddf4e822ce43cff96}"
    container_name: triton-server
    profiles: [server]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOME: /tmp
      TRITON_DB_URL: postgres://triton:triton@postgres:5432/triton?sslmode=disable
      TRITON_LISTEN: ":8080"
      # Enterprise licence token for the CLI guard. This token is
      # signed with the dev license server's SIGNING_KEY (the last
      # 32 bytes of which are the TENANT_PUBKEY below). For real
      # deployments, issue a fresh token via the license server
      # admin UI → Licenses → your license → Download agent.yaml,
      # then extract the license_key field.
      TRITON_LICENSE_KEY: "${TRITON_LICENSE_KEY:-eyJsaWQiOiIwMTljYzQ0MC0zOWIzLTdjNmYtYWZiYy04N2M4YWUzYjMwZWYiLCJ0aWVyIjoiZW50ZXJwcmlzZSIsIm9pZCI6IjAxOWNjNDNmLWZkYmQtNzIzNC1hNmRlLWVhNWQ1OWI3MDM2OCIsIm9yZyI6IkFudHJhcG9sYXRpb24gVGVjaG5vbG9neSIsInNlYXRzIjoxMCwiaWF0IjoxNzcyODE5MDY5LCJleHAiOjE4MDQzNTUwNjl9.JBgW_9DDWR6nCW9PwiP8VBzpeByXGDr5q4XUiOh-6UzdDMlSEKJPGWOUvdIIF8Al7W6IZVoQmhNtjWVggTFWCw}"
      # Phase 5 Sprint 3 env-var wiring for multi-tenant features.
      # See docs/DEPLOYMENT_GUIDE.md §5b.
      #
      # Shared secret for license-server → report-server
      # provisioning; MUST match the license server's
      # TRITON_LICENSE_SERVER_REPORT_KEY below.
      REPORT_SERVER_SERVICE_KEY: "${REPORT_SERVER_SERVICE_KEY:-dev-service-key-888e5158e28d7e4c15088f1488f2d4b38b5d059f42043342a796505a9c53b2c1}"
      # Ed25519 seed (32 bytes, 64 hex chars) for signing org-user
      # JWTs. Dev-only — generate a fresh seed for production.
      REPORT_SERVER_JWT_SIGNING_KEY: "${REPORT_SERVER_JWT_SIGNING_KEY:-61627bd3a313381fed68d8fd5d9b10d9155225e1263fef9e05c706e559a507cd}"
      # Ed25519 PUBLIC key used to verify incoming agent
      # license tokens. Must correspond to the license server's
      # TRITON_LICENSE_SERVER_SIGNING_KEY private key — i.e., it's
      # the LAST 32 bytes of that 64-byte private key. When unset
      # the report server uses the build-time embedded pubkey,
      # which will reject any token the local license server
      # mints. In production, set this to the public half of
      # whatever keypair your licensing vendor controls.
      REPORT_SERVER_TENANT_PUBKEY: "${REPORT_SERVER_TENANT_PUBKEY:-e19a10e284169be04604d1b028c25c40d3ebb8cbccaf9de0e53bade5c7cd0016}"
      # Link embedded in resend-invite emails — points at the
      # report server's own login page.
      REPORT_SERVER_INVITE_URL: "${REPORT_SERVER_INVITE_URL:-http://localhost:8090/ui/#/login}"
      # Phase 5 Sprint 2 — optional Resend mailer. When unset,
      # handleResendInvite falls back to returning the temp
      # password in the JSON body with Cache-Control: no-store.
      REPORT_SERVER_RESEND_API_KEY: "${REPORT_SERVER_RESEND_API_KEY:-}"
      REPORT_SERVER_RESEND_FROM_EMAIL: "${REPORT_SERVER_RESEND_FROM_EMAIL:-}"
      REPORT_SERVER_RESEND_FROM_NAME: "${REPORT_SERVER_RESEND_FROM_NAME:-Triton Reports}"
    ports:
      - "8090:8080"
    command: ["server", "--listen", ":8080", "--db", "postgres://triton:triton@postgres:5432/triton?sslmode=disable"]

  license-server:
    build:
      context: .
      dockerfile: Containerfile.licenseserver
    container_name: triton-license-server
    profiles: [license-server]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRITON_LICENSE_SERVER_DB_URL: postgres://triton:triton@postgres:5432/triton_license?sslmode=disable
      TRITON_LICENSE_SERVER_LISTEN: ":8081"
      TRITON_LICENSE_SERVER_ADMIN_KEY: "${TRITON_LICENSE_SERVER_ADMIN_KEY:-dev-admin-key}"
      TRITON_LICENSE_SERVER_SIGNING_KEY: "${TRITON_LICENSE_SERVER_SIGNING_KEY:-9c4c9d2c0a08d402d3980a358bc0bbe30b92b0462a14f9c277c3f1d961d744ebe19a10e284169be04604d1b028c25c40d3ebb8cbccaf9de0e53bade5c7cd0016}"
      TRITON_LICENSE_SERVER_BINARIES_DIR: /tmp/binaries
      # Bootstrap superadmin — seeds on first startup against an
      # empty users table. Rotate the password immediately after
      # first login in any non-dev environment.
      TRITON_LICENSE_SERVER_ADMIN_EMAIL: "${TRITON_LICENSE_SERVER_ADMIN_EMAIL:-admin@triton.local}"
      TRITON_LICENSE_SERVER_ADMIN_PASSWORD: "${TRITON_LICENSE_SERVER_ADMIN_PASSWORD:-dev-admin-password-change-me}"
      # Cross-server provisioning wiring — MUST match the report
      # server's REPORT_SERVER_SERVICE_KEY above. Uses the
      # compose-network hostname `triton` (service name) to reach
      # the report server, not `localhost`.
      TRITON_LICENSE_SERVER_REPORT_URL: "${TRITON_LICENSE_SERVER_REPORT_URL:-http://triton:8080}"
      # Public URL is what customer agents use to reach the
      # report server from outside the compose network. For
      # local dev this points at the host port mapping (8090).
      # In production, set to the public hostname (e.g.
      # https://reports.example.com).
      TRITON_LICENSE_SERVER_REPORT_PUBLIC_URL: "${TRITON_LICENSE_SERVER_REPORT_PUBLIC_URL:-http://localhost:8090}"
      TRITON_LICENSE_SERVER_REPORT_KEY: "${TRITON_LICENSE_SERVER_REPORT_KEY:-dev-service-key-888e5158e28d7e4c15088f1488f2d4b38b5d059f42043342a796505a9c53b2c1}"
      # Phase 5 Sprint 2 — Resend mailer for first-org-admin
      # invites. Pulled from .env (see RESEND_* block). When
      # unset, provisioning returns the temp password in the API
      # response body for manual delivery.
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-}"
      RESEND_FROM_NAME: "${RESEND_FROM_NAME:-Triton Reports}"
      REPORT_SERVER_INVITE_URL_BASE: "${REPORT_SERVER_INVITE_URL_BASE:-http://localhost:8090/ui/#/login}"
    ports:
      - "8081:8081"

volumes:
  triton-data:
